<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lahuen CRM — Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
</head>
<body>

  <!-- Same structure as index.html -->
  <div class="preview-nav">
    <div class="preview-brand"><img src="../assets/logo.png" alt="Lahuen" class="nav-logo" /><span>CRM</span></div>
    <div class="tab-group">
      <button class="tab-btn active" onclick="showView('dashboard')" id="btn-nav-dashboard">Dashboard</button>
      <button class="tab-btn" onclick="showView('formulario')" id="btn-nav-formulario">Nuevo</button>
    </div>
  </div>

  <div class="page" id="view-dashboard">
    <div class="stat-grid" style="margin-bottom:var(--sp-5);">
      <div class="stat-card"><p class="stat-label">Pendientes</p><p class="stat-value text-warning" id="stat-pendiente">--</p></div>
      <div class="stat-card"><p class="stat-label">Contactados</p><p class="stat-value text-accent" id="stat-contactado">--</p></div>
      <div class="stat-card"><p class="stat-label">En prueba</p><p class="stat-value" id="stat-prueba" style="color:#7c3aed;">--</p></div>
      <div class="stat-card"><p class="stat-label">Clientes</p><p class="stat-value text-success" id="stat-cliente">--</p></div>
      <div class="stat-card"><p class="stat-label">Conversion</p><p class="stat-value" id="stat-conversion">--</p></div>
    </div>
    <div class="toolbar">
      <div class="search-wrap">
        <svg class="search-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" class="search-input" placeholder="Buscar..." oninput="applyFilters()" id="search-input" />
      </div>
      <select class="filter-select" onchange="applyFilters()" id="filter-resultado">
        <option value="">Todos</option><option value="pendiente">Pendiente</option><option value="contactado">Contactado</option>
        <option value="entrega_prueba">En prueba</option><option value="cliente">Cliente</option><option value="no_interesado">No interesado</option>
      </select>
      <select class="filter-select" onchange="applyFilters()" id="filter-vendedor"><option value="">Todos los vendedores</option></select>
      <span id="table-count" class="badge badge-neutral">--</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Local</th><th>Contacto</th><th>Perfil</th><th>Zona</th><th>Resultado</th><th>Seguimiento</th><th></th></tr></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <div class="page-narrow" id="view-formulario" style="display:none;">
    <div style="margin-bottom:var(--sp-6);margin-top:var(--sp-4);">
      <h1 class="text-title">Nuevo prospecto</h1>
      <p class="text-secondary" style="font-size:var(--text-sm);margin-top:2px;">Preview — formulario no funcional</p>
    </div>
    <div class="card">
      <form class="flex flex-col gap-4">
        <div class="form-group"><label class="form-label">Nombre del local *</label><input type="text" class="form-control" placeholder="Ej: Restaurante El Roble" /></div>
        <div class="grid-2">
          <div class="form-group"><label class="form-label">Contacto *</label><input type="text" class="form-control" placeholder="Nombre" /></div>
          <div class="form-group"><label class="form-label">WhatsApp *</label><input type="tel" class="form-control" placeholder="5491112345678" /></div>
        </div>
        <div class="grid-2">
          <div class="form-group"><label class="form-label">Perfil *</label><select class="form-control"><option>Restaurante</option><option>Hotel</option><option>Bar</option></select></div>
          <div class="form-group"><label class="form-label">Segmento</label><select class="form-control"><option>Premium</option><option>Medio</option><option>Volumen</option></select></div>
        </div>
        <div class="grid-2">
          <div class="form-group"><label class="form-label">Zona *</label><input type="text" class="form-control" placeholder="Moreno Centro" /></div>
          <div class="form-group"><label class="form-label">Direccion</label><input type="text" class="form-control" /></div>
        </div>
        <div class="form-group"><label class="form-label">Productos</label><input type="text" class="form-control" placeholder="lechuga, rucula..." /></div>
        <div class="form-group"><label class="form-label">Notas</label><textarea class="form-control" rows="3"></textarea></div>
        <button type="button" class="btn btn-primary w-full">Guardar prospecto</button>
      </form>
    </div>
  </div>

  <div id="modal-overlay" class="modal-overlay" style="display:none;" onclick="if(event.target===this)closeModal()">
    <div class="modal-box">
      <h2 class="modal-title" id="modal-title"></h2>
      <p class="modal-subtitle" id="modal-subtitle"></p>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer" id="modal-footer"></div>
    </div>
  </div>
  <div class="toast-container" id="toast-container"></div>

  <script>
    /* Mock data for preview */
    const MOCK_DATA = [
      ["2026-03-01","Sheraton Pilar","","5423043850000","hotel","Pilar","premium","Panamericana Km 49.5","pendiente","","2026-03-05","","Alta gastronomia","cbd.preparados@gmail.com"],
      ["2026-03-01","Trufa Pilar","","5491157007663","restaurante","Pilar","premium","Calle R. Caamano 1370","contactado","2026-03-01","2026-03-08","rucula, albahaca","Restaurante premium","gmedina86@gmail.com"],
      ["2026-03-01","Hierro Parrilla","","5491128756355","restaurante","CABA - Palermo Soho","premium","Costa Rica 5602","entrega_prueba","2026-03-02","2026-03-09","rucula, lechuga","Parrilla de autor","cbd.preparados@gmail.com"],
      ["2026-03-01","La Esquina de Bella Vista","","5491176335966","restaurante","Bella Vista","medio","","cliente","2026-02-28","","rucula, albahaca","Polo gastronomico","gmedina86@gmail.com"],
      ["2026-03-01","Mercado Concentrador Moreno","","","mercado","Moreno","volumen","Ruta 23 y Graham Bell","pendiente","","2026-03-01","","Ir de madrugada","fefox911@gmail.com"],
      ["2026-03-01","Carrefour","","1121745328","supermercado","Martinez","corporativo","Cuyo 3367","no_interesado","2026-02-20","","","Proceso largo, portal proveedores","cbd.preparados@gmail.com"],
    ];

    const COL = { FECHA_CREACION:0, LOCAL:1, CONTACTO:2, WHATSAPP:3, PERFIL:4, ZONA:5, SEGMENTO:6, DIRECCION:7, RESULTADO:8, FECHA_VISITA:9, FECHA_SEGUIMIENTO:10, PRODUCTOS_INTERES:11, NOTAS:12, VENDEDOR:13 };
    let items = [], allItems = [];

    window.onload = () => {
      allItems = MOCK_DATA.map((r,i) => ({
        idx:i+2, local:r[1], contacto:r[2], whatsapp:r[3], perfil:r[4], zona:r[5],
        segmento:r[6], direccion:r[7], resultado:r[8].toLowerCase().trim(),
        fechaVisita:r[9], fechaSeguimiento:r[10], productosInteres:r[11], notas:r[12], vendedor:r[13]
      }));
      items = allItems;
      populateVendedorFilter();
      applyFilters();
    };

    function populateVendedorFilter() {
      const v = [...new Set(allItems.map(i=>i.vendedor).filter(v=>v))];
      document.getElementById('filter-vendedor').innerHTML = '<option value="">Todos</option>' + v.map(x=>`<option value="${x}">${x.split('@')[0]}</option>`).join('');
    }

    function applyFilters() {
      const q=(document.getElementById('search-input').value||'').toLowerCase();
      const res=document.getElementById('filter-resultado').value;
      const vend=document.getElementById('filter-vendedor').value;
      items = allItems.filter(i => {
        if(!res && i.resultado==='no_interesado') return false;
        if(q && !i.local.toLowerCase().includes(q) && !i.contacto.toLowerCase().includes(q) && !i.zona.toLowerCase().includes(q)) return false;
        if(res && i.resultado!==res) return false;
        if(vend && i.vendedor!==vend) return false;
        return true;
      });
      renderTable(); updateStats();
    }

    function updateStats() {
      const a=allItems.filter(i=>i.resultado!=='no_interesado');
      document.getElementById('stat-pendiente').textContent=allItems.filter(i=>i.resultado==='pendiente').length;
      document.getElementById('stat-contactado').textContent=allItems.filter(i=>i.resultado==='contactado').length;
      document.getElementById('stat-prueba').textContent=allItems.filter(i=>i.resultado==='entrega_prueba').length;
      const cl=allItems.filter(i=>i.resultado==='cliente').length;
      document.getElementById('stat-cliente').textContent=cl;
      document.getElementById('stat-conversion').textContent=a.length>0?Math.round((cl/a.length)*100)+'%':'--';
    }

    function renderTable() {
      const tb=document.getElementById('tableBody');
      document.getElementById('table-count').textContent=items.length+' prospectos';
      if(!items.length){tb.innerHTML='<tr><td colspan="7" class="empty-state"><p>Sin datos</p></td></tr>';return;}
      const bm={pendiente:{c:'badge-warning',l:'Pendiente'},contactado:{c:'badge-info',l:'Contactado'},entrega_prueba:{c:'badge-purple',l:'En prueba'},cliente:{c:'badge-success',l:'Cliente'},no_interesado:{c:'badge-neutral',l:'No interesado'}};
      const pl={restaurante:'Restaurante',hotel:'Hotel',bar:'Bar',dietetica:'Dietetica',revendedor:'Revendedor',mercado:'Mercado',distribuidor:'Distribuidor',feria:'Feria',supermercado:'Supermercado',comunidad:'Comunidad',otro:'Otro'};
      tb.innerHTML=items.map(i=>{
        const b=bm[i.resultado]||{c:'badge-neutral',l:i.resultado};
        const ov=isOverdue(i.fechaSeguimiento,i.resultado);
        const seg=getSeg(i);
        const cls=i.resultado==='no_interesado'?'row-faded':(ov?'row-overdue':'');
        return `<tr class="${cls}"><td class="td-name">${i.local}</td><td>${i.contacto||'--'}${i.whatsapp?'<br><span class="text-tertiary" style="font-size:var(--text-xs);">'+i.whatsapp+'</span>':''}</td><td><span class="badge badge-neutral">${pl[i.perfil]||i.perfil}</span></td><td class="text-secondary">${i.zona}</td><td><span class="badge ${b.c}">${b.l}</span></td><td>${seg}</td><td><div class="row-actions">${i.whatsapp?'<button class="action-btn wa" title="WhatsApp"><svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg></button>':''}<button class="action-btn" title="Editar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button><button class="action-btn" title="Estado" style="color:var(--color-accent);"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></svg></button></div></td></tr>`;
      }).join('');
    }

    function isOverdue(f,r){if(!f||r==='cliente'||r==='no_interesado')return false;const d=new Date(f);if(isNaN(d))return false;const t=new Date();t.setHours(0,0,0,0);return d<=t;}
    function getSeg(i){if(!i.fechaSeguimiento)return'<span class="text-tertiary">--</span>';const d=new Date(i.fechaSeguimiento);if(isNaN(d.getTime()))return'--';const t=new Date();t.setHours(0,0,0,0);const diff=Math.ceil((d-t)/864e5);if(i.resultado==='cliente'||i.resultado==='no_interesado')return`<span class="text-tertiary">${i.fechaSeguimiento}</span>`;if(diff<0)return`<span class="text-danger" style="font-weight:600;">Vencido (${Math.abs(diff)}d)</span>`;if(diff===0)return'<span class="text-warning" style="font-weight:600;">Hoy</span>';if(diff<=3)return`<span class="text-warning">En ${diff}d</span>`;return`<span class="text-secondary">${i.fechaSeguimiento}</span>`;}

    function showView(v) {
      document.getElementById('view-dashboard').style.display=v==='dashboard'?'':'none';
      document.getElementById('view-formulario').style.display=v==='formulario'?'':'none';
      document.getElementById('btn-nav-dashboard').classList.toggle('active',v==='dashboard');
      document.getElementById('btn-nav-formulario').classList.toggle('active',v==='formulario');
    }
    function closeModal(){document.getElementById('modal-overlay').style.display='none';}
  </script>
</body>
</html>
