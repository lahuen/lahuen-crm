<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lahuen CRM — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <?!= include('theme') ?>
</head>
<body>

  <div class="preview-nav">
    <div class="preview-brand"><img src="assets/logo.png" alt="Lahuen" class="nav-logo" /><span>CRM</span></div>
    <div class="tab-group">
      <button class="tab-btn active">Dashboard</button>
      <button class="tab-btn" onclick="window.top.location.href='<?!= getScriptUrl() ?>?p=Formulario'">Nuevo</button>
    </div>
  </div>

  <div class="page">
    <div class="stat-grid" style="margin-bottom:var(--sp-5);">
      <div class="stat-card"><p class="stat-label">Pendientes</p><p class="stat-value text-warning" id="stat-pendiente">--</p></div>
      <div class="stat-card"><p class="stat-label">Contactados</p><p class="stat-value text-accent" id="stat-contactado">--</p></div>
      <div class="stat-card"><p class="stat-label">En prueba</p><p class="stat-value" id="stat-prueba" style="color:#7c3aed;">--</p></div>
      <div class="stat-card"><p class="stat-label">Clientes</p><p class="stat-value text-success" id="stat-cliente">--</p></div>
      <div class="stat-card"><p class="stat-label">Conversion</p><p class="stat-value" id="stat-conversion">--</p></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <svg class="search-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" class="search-input" placeholder="Buscar..." oninput="applyFilters()" id="search-input" />
      </div>
      <select class="filter-select" onchange="applyFilters()" id="filter-resultado">
        <option value="">Todos</option>
        <option value="pendiente">Pendiente</option>
        <option value="contactado">Contactado</option>
        <option value="entrega_prueba">En prueba</option>
        <option value="cliente">Cliente</option>
        <option value="no_interesado">No interesado</option>
      </select>
      <span id="table-count" class="badge badge-neutral">--</span>
    </div>

    <div class="table-wrap">
      <table>
        <thead><tr><th>Local</th><th>Contacto</th><th>Perfil</th><th>Zona</th><th>Resultado</th><th>Seguimiento</th></tr></thead>
        <tbody id="tableBody"><tr><td colspan="6" class="empty-state"><p>Cargando...</p></td></tr></tbody>
      </table>
    </div>
  </div>

  <script>
    const COL = { FECHA_CREACION:0, LOCAL:1, CONTACTO:2, WHATSAPP:3, PERFIL:4, ZONA:5, SEGMENTO:6, DIRECCION:7, RESULTADO:8, FECHA_VISITA:9, FECHA_SEGUIMIENTO:10, PRODUCTOS_INTERES:11, NOTAS:12, VENDEDOR:13 };
    let items = [], allItems = [];

    window.onload = () => {
      google.script.run.withSuccessHandler(onData).withFailureHandler(onErr).getProspectData();
    };

    function onData(data) {
      if (typeof data === 'string') { document.getElementById('tableBody').innerHTML = `<tr><td colspan="6" class="empty-state"><p>${data}</p></td></tr>`; return; }
      allItems = (data || []).map((r, i) => ({
        idx: i+2, local: r[COL.LOCAL]||'', contacto: r[COL.CONTACTO]||'', whatsapp: r[COL.WHATSAPP]||'',
        perfil: r[COL.PERFIL]||'', zona: r[COL.ZONA]||'', resultado: (r[COL.RESULTADO]||'pendiente').toLowerCase().trim(),
        fechaSeguimiento: r[COL.FECHA_SEGUIMIENTO]||''
      }));
      items = allItems;
      applyFilters();
    }
    function onErr(e) { document.getElementById('tableBody').innerHTML = '<tr><td colspan="6" class="empty-state"><p>Error</p></td></tr>'; }

    function applyFilters() {
      const q = (document.getElementById('search-input').value||'').toLowerCase();
      const res = document.getElementById('filter-resultado').value;
      items = allItems.filter(i => {
        if (!res && i.resultado === 'no_interesado') return false;
        if (q && !i.local.toLowerCase().includes(q) && !i.contacto.toLowerCase().includes(q) && !i.zona.toLowerCase().includes(q)) return false;
        if (res && i.resultado !== res) return false;
        return true;
      });
      renderTable();
      updateStats();
    }

    function updateStats() {
      const a = allItems.filter(i => i.resultado !== 'no_interesado');
      document.getElementById('stat-pendiente').textContent = allItems.filter(i => i.resultado==='pendiente').length;
      document.getElementById('stat-contactado').textContent = allItems.filter(i => i.resultado==='contactado').length;
      document.getElementById('stat-prueba').textContent = allItems.filter(i => i.resultado==='entrega_prueba').length;
      const cl = allItems.filter(i => i.resultado==='cliente').length;
      document.getElementById('stat-cliente').textContent = cl;
      document.getElementById('stat-conversion').textContent = a.length > 0 ? Math.round((cl/a.length)*100)+'%' : '--';
    }

    function renderTable() {
      const tb = document.getElementById('tableBody');
      document.getElementById('table-count').textContent = items.length + ' prospectos';
      if (!items.length) { tb.innerHTML = '<tr><td colspan="6" class="empty-state"><p>Sin datos</p></td></tr>'; return; }
      const badgeMap = { pendiente:{c:'badge-warning',l:'Pendiente'}, contactado:{c:'badge-info',l:'Contactado'}, entrega_prueba:{c:'badge-purple',l:'En prueba'}, cliente:{c:'badge-success',l:'Cliente'}, no_interesado:{c:'badge-neutral',l:'No interesado'} };
      tb.innerHTML = items.map(i => {
        const b = badgeMap[i.resultado] || {c:'badge-neutral',l:i.resultado};
        const ov = isOverdue(i.fechaSeguimiento, i.resultado);
        const seg = getSeg(i);
        const cls = i.resultado==='no_interesado'?'row-faded':(ov?'row-overdue':'');
        return `<tr class="${cls}"><td class="td-name">${esc(i.local)}</td><td>${esc(i.contacto)}</td><td><span class="badge badge-neutral">${esc(pLabel(i.perfil))}</span></td><td class="text-secondary">${esc(i.zona)}</td><td><span class="badge ${b.c}">${b.l}</span></td><td>${seg}</td></tr>`;
      }).join('');
    }

    function isOverdue(f, r) { if (!f||r==='cliente'||r==='no_interesado') return false; const d=new Date(f); if(isNaN(d))return false; const t=new Date();t.setHours(0,0,0,0); return d<=t; }
    function getSeg(i) {
      if (!i.fechaSeguimiento) return '<span class="text-tertiary">--</span>';
      const d=new Date(i.fechaSeguimiento); if(isNaN(d.getTime()))return '--';
      const t=new Date();t.setHours(0,0,0,0); const diff=Math.ceil((d-t)/864e5);
      if(i.resultado==='cliente'||i.resultado==='no_interesado') return `<span class="text-tertiary">${i.fechaSeguimiento}</span>`;
      if(diff<0) return `<span class="text-danger" style="font-weight:600;">Vencido (${Math.abs(diff)}d)</span>`;
      if(diff===0) return '<span class="text-warning" style="font-weight:600;">Hoy</span>';
      if(diff<=3) return `<span class="text-warning">En ${diff}d</span>`;
      return `<span class="text-secondary">${i.fechaSeguimiento}</span>`;
    }
    function pLabel(p) { return {restaurante:'Restaurante',hotel:'Hotel',bar:'Bar',dietetica:'Dietetica',revendedor:'Revendedor',mercado:'Mercado',distribuidor:'Distribuidor',feria:'Feria',supermercado:'Supermercado',comunidad:'Comunidad',otro:'Otro'}[p]||p||'--'; }
    function esc(s) { if(!s)return''; const d=document.createElement('div');d.textContent=s;return d.innerHTML; }
  </script>
</body>
</html>
